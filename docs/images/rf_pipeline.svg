  <text x="297" y="362" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#042C53">AUC</text>
  <text x="297" y="376" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#042C53">test = 0.773</text>
  <rect x="350" y="348" width="85" height="36" rx="4" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="392" y="362" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#042C53">Brier Score</text>
  <text x="392" y="376" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#042C53">calibration</text>
  <rect x="445" y="348" width="85" height="36" rx="4" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="487" y="362" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#042C53">Youden J*</text>
  <text x="487" y="376" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#042C53">threshold</text>
  <rect x="540" y="348" width="85" height="36" rx="4" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="582" y="362" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#042C53">Confusion</text>
  <text x="582" y="376" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#042C53">matrix</text>
  <path d="M552 124 L552 308 L440 308" fill="none" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M552 204 L552 250 L440 250 L440 308" fill="none" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="240" y="460" width="400" height="30" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="440" y="475" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#633806">5-class susceptibility map · municipality summaries</text>
  <line x1="440" y1="440" x2="440" y2="458" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
