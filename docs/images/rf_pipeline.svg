<svg width="100%" viewBox="0 0 680 510" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Random Forest training and evaluation pipeline</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="180" height="60" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="110" y="42" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#633806">Stratified Sampling</text>
  <text x="110" y="60" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#854F0B">2000 pts/class · balanced</text>
  <rect x="20" y="130" width="180" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="110" y="152" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#085041">Spatial Holdout Split</text>
  <text x="110" y="170" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#0F6E56">by polygon_id</text>
  <rect x="20" y="240" width="80" height="44" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="60" y="258" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#04342C">Train</text>
  <text x="60" y="274" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#04342C">Mação, Góis</text>
  <rect x="120" y="240" width="80" height="44" rx="6" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text x="160" y="258" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#4A1B0C">Test</text>
  <text x="160" y="274" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#4A1B0C">Pedrógão</text>
  <line x1="110" y1="80" x2="110" y2="128" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="80" y1="190" x2="60" y2="238" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="140" y1="190" x2="160" y2="238" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="240" y="130" width="180" height="80" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="330" y="152" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#3C3489">Random Forest</text>
  <text x="330" y="170" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#534AB7">100 trees</text>
  <text x="330" y="186" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#534AB7">minLeafPopulation = 10</text>
  <path d="M100 262 L240 175" fill="none" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M200 262 L240 185" fill="none" stroke="#D85A30" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="460" y="80" width="185" height="44" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="552" y="98" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#633806">Reburn probability</text>
  <text x="552" y="114" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#854F0B">PROBABILITY mode · 0–1</text>
  <rect x="460" y="160" width="185" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="552" y="178" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#3C3489">Classification</text>
  <text x="552" y="194" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#534AB7">CLASSIFICATION mode</text>
  <path d="M420 155 L458 108" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M420 175 L458 182" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="240" y="310" width="400" height="130" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
